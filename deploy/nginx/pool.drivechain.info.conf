# pool.drivechain.info — reverse proxy for the simplepool dashboard.
#
# The dashboard is a read-only Node/Express app bound to 127.0.0.1:8081
# (see deploy/systemd/simplepool-dashboard.service). nginx terminates
# HTTP on :80 and proxies through.
#
# To add TLS later: run `sudo certbot --nginx -d pool.drivechain.info`
# and certbot will edit this file to add a :443 server block.

server {
    listen 80;
    listen [::]:80;
    server_name pool.drivechain.info;

    # Modest per-IP rate limit so the dashboard can't be flooded.
    limit_req zone=pool_dash burst=20 nodelay;

    access_log /var/log/nginx/pool.drivechain.info.access.log;
    error_log  /var/log/nginx/pool.drivechain.info.error.log warn;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # The dashboard auto-refreshes every 15s; cache its static assets.
    location /static/ {
        proxy_pass         http://127.0.0.1:8081;
        proxy_cache_valid  200 1h;
        expires            1h;
        add_header         Cache-Control "public";
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:8081/healthz;
        access_log off;
    }
}
